// ── State ─────────────────────────────────────────────────────────────
let lang='de', airport='VIE', tripType='round', persons=2, step='form';
let lastKm=null, lastRate=null, lastRabRound=0, lastRabOneway=0, lastRabReturn=0, priceTimer=null;
let acItems=[], acTimer=null;

const $=(id)=>document.getElementById(id);
const t=()=>I18N[lang];

// ── Style-Helfer ──────────────────────────────────────────────────────
function langStyle(on){return `padding:5px 11px;border-radius:6px;cursor:pointer;border:none;background:${on?'#2563eb':'transparent'};color:${on?'#fff':'#64748b'};font-weight:700;font-size:11.5px;transition:all .15s`;}
function tripStyle(on){return `flex:1;position:relative;text-align:center;padding:10px 4px;border-radius:10px;cursor:pointer;border:1.5px solid ${on?'#2563eb':'#e8eef6'};background:${on?'#2563eb':'#f6f9fd'};color:${on?'#fff':'#475569'};font-weight:700;font-size:12.5px;transition:all .15s`;}

// ── i18n + Listen ─────────────────────────────────────────────────────
function applyText(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t()[el.getAttribute('data-i18n')];
    if(typeof v==='string') el.innerHTML=v;
  });
  document.querySelectorAll('[data-ph]').forEach(el=>{
    const v=t()[el.getAttribute('data-ph')];
    if(typeof v==='string') el.setAttribute('placeholder',v);
  });
  document.documentElement.lang=lang;
}
function renderLists(){
  if(!$('chips')) return;
  $('chips').innerHTML=t().chips.map(c=>
    `<li style="display:inline-flex;align-items:center;gap:4px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#16a34a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>${c}</li>`).join('');
}

// ── Toggle-Styles ─────────────────────────────────────────────────────
function refreshToggles(){
  $('langDe').setAttribute('style',langStyle(lang==='de'));
  $('langEn').setAttribute('style',langStyle(lang==='en'));
  if($('airSelect')) $('airSelect').value=airport;
  $('tripRound').setAttribute('style',tripStyle(tripType==='round'));
  $('tripOneway').setAttribute('style',tripStyle(tripType==='oneway'));
  $('tripReturn').setAttribute('style',tripStyle(tripType==='return'));
  // "Empfohlen"-Badge nur auf Hin & Retour
  $('tripRound').innerHTML=t().tripRound+(tripType==='round'
     ?`<span style="display:block;font-size:9px;font-weight:800;margin-top:1px;opacity:.9">${t().empfohlen}</span>`:'');
  $('outboundBlock').classList.toggle('hidden',tripType==='return');
  $('returnBlock').classList.toggle('hidden',tripType==='oneway');
  if($('personsSelect')) $('personsSelect').value=persons;
}

// ── Handler ───────────────────────────────────────────────────────────
function setLang(l){lang=l;applyText();renderLists();refreshToggles();updatePriceUI();syncCta();}
function setAirport(a){airport=a;refreshToggles();fetchPrice();}
function setTrip(tt){tripType=tt;refreshToggles();computePrice();}
function setPersons(v){persons=Math.min(8,Math.max(1,parseInt(v)||1));refreshToggles();}

// ── Schritt-Navigation (App-Flow) ─────────────────────────────────────
function syncCta(){
  const b=$('submitBtn');
  if(step==='form')      b.textContent=t().continue;
  else if(step==='details') b.textContent=t().submit;
}
function goStep(s){
  step=s;
  $('stepForm').classList.toggle('hidden',s!=='form');
  $('stepDetails').classList.toggle('hidden',s!=='details');
  $('sticky').classList.remove('hidden');
  syncCta();
  try{ $('stepForm').parentElement.scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){}
  window.scrollTo({top:0,behavior:'smooth'});
}
function updateRecap(){
  const p=currentPrice();
  $('recapVal').textContent=(p!=null)?fmtEur(p):'—';
}
function nextStep(){
  const a=$('address').value.trim();
  if(a.length<3){ $('address').focus(); return; }
  updateRecap();
  goStep('details');
}
function primaryAction(){
  if(step==='form') nextStep();
  else if(step==='details') $('formSubmit').click();
}

// ── Preis live ────────────────────────────────────────────────────────
function onAddressInput(){
  clearTimeout(priceTimer);
  saveContact();
  const a=$('address').value.trim();
  if(a.length<3){ hideAc(); }
  else { clearTimeout(acTimer); acTimer=setTimeout(fetchSuggestions,250); }
  if(a.length<4){$('priceBox').classList.add('hidden');lastKm=null;return;}
  priceTimer=setTimeout(fetchPrice,800);
}
function formatPhoton(p){
  const l1=[p.street||p.name, p.housenumber].filter(Boolean).join(' ');
  const l2=[p.postcode, p.city||p.district||p.state].filter(Boolean).join(' ');
  return [l1||p.name, l2].filter(Boolean).join(', ').trim();
}
function fetchSuggestions(){
  const a=$('address').value.trim();
  if(a.length<3){hideAc();return;}
  const url='https://photon.komoot.io/api/?lang=de&limit=8&lat=48.2092&lon=16.3728&q='+encodeURIComponent(a);
  fetch(url).then(r=>r.json()).then(d=>{
    const seen={};
    const items=(d.features||[]).map(f=>f.properties)
      .filter(p=> p.countrycode==='AT' || /Österreich|Austria/i.test(p.country||''))
      .map(formatPhoton)
      .filter(v=> v && !seen[v] && (seen[v]=1))
      .slice(0,5);
    renderAc(items);
  }).catch(()=>hideAc());
}
function renderAc(items){
  acItems=items;
  if(!items.length){hideAc();return;}
  $('acList').innerHTML=items.map((s,i)=>`<li onmousedown="pickAc(${i})">${s}</li>`).join('');
  $('acList').classList.remove('hidden');
}
function pickAc(i){ $('address').value=acItems[i]; hideAc(); saveContact(); fetchPrice(); }
function hideAc(){ $('acList').classList.add('hidden'); }
function fetchPrice(){
  const a=$('address').value.trim();
  if(a.length<4){$('priceBox').classList.add('hidden');return;}
  $('priceBox').classList.remove('hidden');
  $('priceSpin').classList.remove('hidden');
  $('priceVal').textContent='';
  $('priceKm').textContent='';
  const url=APPS_SCRIPT_URL+'?action=price&airport='+airport+'&adresse='+encodeURIComponent(a);
  fetch(url).then(r=>r.json()).then(d=>{
    $('priceSpin').classList.add('hidden');
    if(d.status==='ok'){
      lastKm=d.km; lastRate=d.preisProKm;
      lastRabRound=d.rabattRound||0; lastRabOneway=d.rabattOneway||0; lastRabReturn=d.rabattReturn||0;
      computePrice();
    }else{
      lastKm=null;
      $('priceVal').textContent='—';
      $('priceKm').textContent=(lang==='de'?'Adresse nicht gefunden':'Address not found');
    }
  }).catch(()=>{
    $('priceSpin').classList.add('hidden');
    lastKm=null;
    $('priceVal').textContent='—';
    $('priceKm').textContent=(lang==='de'?'Preis folgt nach Bestätigung':'Price follows after confirmation');
  });
}
function currentPrice(){
  if(lastKm==null||lastRate==null) return null;
  let base=lastKm*lastRate, rab=0;
  if(tripType==='round'){ base=base*2; rab=lastRabRound; }
  else if(tripType==='oneway'){ rab=lastRabOneway; }
  else { rab=lastRabReturn; }
  if(rab>0) base=base*(1-rab/100);
  return Math.round(base*100)/100;
}
function currentFull(){
  if(lastKm==null||lastRate==null) return null;
  let full=lastKm*lastRate;
  if(tripType==='round') full=full*2;
  return Math.round(full*100)/100;
}
function currentSavings(){
  if(lastKm==null||lastRate==null) return 0;
  let full=lastKm*lastRate, rab=0;
  if(tripType==='round'){ full=full*2; rab=lastRabRound; }
  else if(tripType==='oneway'){ rab=lastRabOneway; }
  else { rab=lastRabReturn; }
  if(rab<=0) return 0;
  return Math.round(full*rab/100*100)/100;
}
function fmtEur(v){ if(v==null) return '—'; return (Math.round(v*100)/100).toString().replace('.',',')+' €'; }
function computePrice(){updatePriceUI();}
function updatePriceUI(){
  const p=currentPrice();
  if(p!=null){
    $('priceVal').textContent=fmtEur(p);
    const tripTxt=tripType==='round'?t().tripRound:tripType==='oneway'?t().tripOneway:t().tripReturn;
    $('priceKm').textContent='ca. '+lastKm+' km · '+tripTxt;
    const s=currentSavings(), save=$('priceSave'), orig=$('priceOrig');
    if(s>0){
      save.textContent=(lang==='de'?'Heute sparen: ':'You save: ')+fmtEur(s); save.classList.remove('hidden');
      orig.textContent=fmtEur(currentFull()); orig.classList.remove('hidden');
    }else{ save.classList.add('hidden'); orig.classList.add('hidden'); }
  }
  if($('priceBox').querySelector('.lbl')) $('priceBox').querySelector('.lbl').textContent=t().priceLabel;
  if(step==='details') updateRecap();
}

// ── Buchung absenden ──────────────────────────────────────────────────
function submitBooking(e){
  e.preventDefault();
  const f=e.target.elements;
  const g=(n)=>f[n]&&f[n].value?f[n].value:'';
  const btn=$('submitBtn');
  btn.disabled=true; btn.style.opacity='.7';
  btn.textContent=(lang==='de'?'Wird gesendet…':'Sending…');

  const airportName=airport==='VIE'?'Flughafen Wien (VIE)':'Flughafen Bratislava (BTS)';
  const tripTxt=tripType==='round'?t().tripRound:tripType==='oneway'?t().tripOneway:t().tripReturn;
  const von=(tripType!=='return')?(g('outDate')+' '+g('outTime')).trim():'';
  const bis=(tripType!=='oneway')?(g('retDate')+' '+g('retTime')).trim():'';
  const preis=currentPrice();

  const params=new URLSearchParams({
    action:'book',
    name:g('name'), tel:g('phone'), email:g('email'),
    adresse:g('address'),
    direction:airport+' · '+tripTxt,
    von:von, bis:bis,
    personen:String(persons),
    km:lastKm!=null?String(lastKm):'',
    preis:preis!=null?String(preis):''
  });
  if(consent.statistics) params.set('vid', getVisitorId());

  fetch(APPS_SCRIPT_URL+'?'+params.toString())
    .then(r=>r.json()).catch(()=>({status:'ok'}))
    .then(()=>showConfirmation(g, airportName, tripTxt, von, bis, preis))
    .finally(()=>{btn.disabled=false;btn.style.opacity='1';syncCta();});
  return false;
}
function showConfirmation(g, airportName, tripTxt, von, bis, preis){
  const T=t();
  const rows=[];
  rows.push([T.lblAirport, airportName]);
  rows.push([T.lblTrip, tripTxt]);
  rows.push([T.lblAddress, g('address')||'—']);
  if(tripType!=='return') rows.push([T.lblOutbound, von||'—']);
  if(tripType!=='oneway') rows.push([T.lblReturn, bis||'—']);
  rows.push([T.lblPersons, String(persons)]);
  if(preis!=null) rows.push([T.priceLabel, fmtEur(preis)]);
  rows.push([T.lblName, g('name')||'—']);
  rows.push([T.lblPhone, g('phone')||'—']);
  rows.push([T.lblEmail, g('email')||'—']);
  $('summaryRows').innerHTML=rows.map(r=>
    `<div style="display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-bottom:1px solid #eef1f6;font-size:13px">
      <span style="color:#64748b">${r[0]}</span><span style="color:#0f1f3c;font-weight:600;text-align:right">${r[1]}</span></div>`).join('');
  $('stepForm').classList.add('hidden');
  $('stepDetails').classList.add('hidden');
  $('sticky').classList.add('hidden');
  $('confBox').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}
function resetForm(){
  $('bookForm').reset();
  lastKm=null;lastRate=null;lastRabRound=0;lastRabOneway=0;lastRabReturn=0;
  hideAc();
  $('priceBox').classList.add('hidden');
  $('confBox').classList.add('hidden');
  persons=2;tripType='round';airport='VIE';
  goStep('form');
  refreshToggles();
  loadContact();
}

// ── Eingaben merken (nur lokal im Browser) ────────────────────────────
const LS_KEY='gta_contact';
function fld(n){return document.querySelector('[name='+n+']');}
function saveContact(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({
      name:fld('name').value, phone:fld('phone').value,
      email:fld('email').value, address:$('address').value
    }));
    updateForgetLink();
  }catch(e){}
}
function loadContact(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw){updateForgetLink();return;}
    const d=JSON.parse(raw);
    if(d.name)  fld('name').value=d.name;
    if(d.phone) fld('phone').value=d.phone;
    if(d.email) fld('email').value=d.email;
    if(d.address){ $('address').value=d.address; fetchPrice(); }
    updateForgetLink();
  }catch(e){}
}
function forgetContact(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  ['name','phone','email'].forEach(n=>fld(n).value='');
  $('address').value='';
  hideAc(); $('priceBox').classList.add('hidden'); lastKm=null;
  updateForgetLink();
}
function updateForgetLink(){
  let has=false; try{ has=!!localStorage.getItem(LS_KEY); }catch(e){}
  const el=$('forgetWrap'); if(el) el.classList.toggle('hidden',!has);
}

// ── Besucher-Tracking ─────────────────────────────────────────────────
function getVisitorId(){
  try{
    let id=localStorage.getItem('gta_vid');
    if(!id){ id='v_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); localStorage.setItem('gta_vid',id); }
    return id;
  }catch(e){ return 'v_'+Date.now(); }
}
function getPlatform(){
  try{
    const p=new URLSearchParams(location.search);
    const src=p.get('utm_source')||p.get('source'); if(src) return src;
    const r=document.referrer||'';
    if(/facebook|fb\./i.test(r)) return 'Facebook';
    if(/instagram/i.test(r))     return 'Instagram';
    if(/google/i.test(r))        return 'Google';
    if(/tiktok/i.test(r))        return 'TikTok';
    if(/willhaben/i.test(r))     return 'willhaben';
    if(!r) return 'Direkt';
    return 'Andere';
  }catch(e){ return 'Unbekannt'; }
}
function getRegion(){
  const svc=[
    {url:'https://ipapi.co/json/',              f:d=>({city:d.city,country:d.country_name})},
    {url:'https://ipwho.is/',                   f:d=>(d&&d.success===false)?null:({city:d.city,country:d.country})},
    {url:'https://get.geojs.io/v1/ip/geo.json', f:d=>({city:d.city,country:d.country})}
  ];
  function tryNext(i){
    if(i>=svc.length) return Promise.resolve(null);
    return fetch(svc[i].url).then(r=>{if(!r.ok)throw 0;return r.json();})
      .then(d=>{const p=svc[i].f(d); return (p&&(p.city||p.country))?p:tryNext(i+1);})
      .catch(()=>tryNext(i+1));
  }
  return tryNext(0);
}
function tzFallback(){
  try{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
    const m={'Europe/Vienna':'Wien, Österreich','Europe/Berlin':'Deutschland','Europe/Zurich':'Schweiz',
             'Europe/Bratislava':'Slowakei','Europe/Budapest':'Ungarn','Europe/Prague':'Tschechien'};
    return m[tz]?{city:'',country:m[tz]}:null;
  }catch(e){ return null; }
}
function regionText(d){
  if(!d) return '';
  if(d.city&&d.country) return d.city+', '+d.country;
  return d.city||d.country||'';
}
function trackVisit(){
  function send(region){
    fetch(APPS_SCRIPT_URL+'?action=visit'
      +'&vid='+encodeURIComponent(getVisitorId())
      +'&platform='+encodeURIComponent(getPlatform())
      +'&region='+encodeURIComponent(region||'')).catch(()=>{});
  }
  try{
    getRegion().then(d=>{ if(!d) d=tzFallback(); send(regionText(d)); }).catch(()=>send(''));
  }catch(e){ send(''); }
}

let consent={statistics:false, marketing:false};
let statsStarted=false, mktLoaded=false;

function ckLoadDecision(){
  try{ const r=localStorage.getItem(CONSENT_KEY); if(r){ const c=JSON.parse(r); consent.statistics=!!c.statistics; consent.marketing=!!c.marketing; return true; } }catch(e){}
  return false;
}
function ckStore(){
  try{ localStorage.setItem(CONSENT_KEY, JSON.stringify({statistics:consent.statistics, marketing:consent.marketing, ts:Date.now(), v:1})); }catch(e){}
}
function ckApply(){
  if(consent.statistics) startStatistics(); else stopStatistics();
  if(consent.marketing)  startMarketing();  else stopMarketing();
}
function ckChoose(stat, mkt){ consent.statistics=stat; consent.marketing=mkt; ckStore(); ckApply(); ckHide(); }
function ckSaveSelection(){ consent.statistics=$('ckStat').checked; consent.marketing=$('ckMkt').checked; ckStore(); ckApply(); ckHide(); }
function ckHide(){ $('ckBanner').classList.add('hidden'); $('ckModal').classList.add('hidden'); }
function openCookieSettings(){
  $('ckStat').checked=consent.statistics; $('ckMkt').checked=consent.marketing;
  $('ckBanner').classList.add('hidden'); $('ckModal').classList.remove('hidden');
}
function startStatistics(){ if(statsStarted) return; statsStarted=true; trackVisit(); }
function stopStatistics(){ statsStarted=false; try{ localStorage.removeItem('gta_vid'); }catch(e){} }
function startMarketing(){
  if(mktLoaded) return; mktLoaded=true;
  // ▼▼▼ HIER Marketing-Skripte einsetzen (Meta Pixel / Google Ads), sobald IDs vorhanden ▼▼▼
  // ▲▲▲ ------------------------------------------------------------------------------- ▲▲▲
}
function stopMarketing(){
  mktLoaded=false;
  try{ document.cookie.split(';').forEach(function(c){
    const n=c.split('=')[0].trim();
    if(/^(_fbp|_fbc|_ga|_gid|_gat|_gcl)/.test(n)){
      document.cookie=n+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
      document.cookie=n+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=.'+location.hostname;
    }
  }); }catch(e){}
}
function initConsent(){
  if(ckLoadDecision()){ ckApply(); }
  else { $('ckBanner').classList.remove('hidden'); }
}

// ── Init ──────────────────────────────────────────────────────────────
applyText();renderLists();refreshToggles();loadContact();goStep('form');initConsent();
</script>
