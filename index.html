// ── State ─────────────────────────────────────────────────────────────
let lang='de', airport='VIE', tripType='round', persons=2, openFaq=0;
let lastKm=null, lastRate=null, priceTimer=null;

const $=(id)=>document.getElementById(id);
const t=()=>I18N[lang];

// ── Style-Helfer für Toggle-Buttons ───────────────────────────────────
function segStyle(on){return `flex:1;text-align:center;padding:10px 6px;border-radius:9px;cursor:pointer;border:none;font-size:13.5px;transition:all .15s;background:${on?'#fff':'transparent'};color:${on?'#0E2A52':'#5E6B82'};font-weight:${on?700:600};box-shadow:${on?'0 1px 4px rgba(16,40,82,.16)':'none'}`;}
function langStyle(on){return `padding:6px 11px;border-radius:8px;cursor:pointer;border:none;background:${on?'#1A6BE0':'transparent'};color:${on?'#fff':'#5E6B82'};font-weight:700;font-size:13px;transition:all .15s`;}
function airStyle(on){return `display:flex;flex-direction:column;gap:7px;align-items:flex-start;padding:13px 14px;border-radius:13px;cursor:pointer;text-align:left;border:${on?'2px solid #1A6BE0':'2px solid #E4EAF3'};background:${on?'#EFF5FE':'#fff'};transition:all .15s;width:100%`;}

// ── i18n + Listen rendern ─────────────────────────────────────────────
function applyText(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=t()[el.getAttribute('data-i18n')];
    if(typeof v==='string') el.textContent=v;
  });
  document.documentElement.lang=lang;
}
function renderLists(){
  const T=t();
  $('chips').innerHTML=T.chips.map(c=>
    `<li style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E4EBF5;border-radius:999px;padding:8px 14px;font-weight:600;font-size:14px;color:#2B3A55;box-shadow:0 1px 4px rgba(16,40,82,.04)">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#E4F4EC;color:#1F9D6B;font-size:11px;font-weight:800">✓</span>${c}</li>`).join('');

  $('stats').innerHTML=T.stats.map(s=>
    `<div style="background:#F7FAFE;border:1px solid #EAF0F8;border-radius:16px;padding:18px 20px">
      <div style="font-family:'Sora';font-weight:800;font-size:30px;color:#1A6BE0;letter-spacing:-.02em">${s.n}</div>
      <div style="font-size:13.5px;color:#5E6B82;margin-top:2px">${s.l}</div></div>`).join('');

  $('priceCards').innerHTML=T.priceCards.map(card=>
    `<div style="background:#fff;border:1px solid #E7EDF6;border-radius:20px;padding:28px;box-shadow:0 10px 30px -16px rgba(16,40,82,.18)">
      <div style="display:flex;align-items:center;gap:11px">
        <span style="font-family:'Sora';font-weight:800;font-size:15px;background:#0E2A52;color:#fff;padding:5px 9px;border-radius:8px">${card.code}</span>
        <h3 style="font-family:'Sora';font-weight:700;font-size:20px;color:#0E2A52">${card.airport}</h3></div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:18px">
        <span style="font-family:'Sora';font-weight:800;font-size:34px;color:#1A6BE0;letter-spacing:-.02em">${card.price}</span></div>
      <div style="font-size:13.5px;color:#6B7892;margin-top:2px">${card.eta}</div>
      <ul style="margin-top:20px;display:flex;flex-direction:column;gap:11px">${card.inc.map(line=>
        `<li style="display:flex;align-items:flex-start;gap:10px;font-size:15px;color:#2B3A55">
          <span style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#E4F4EC;color:#1F9D6B;font-size:11px;font-weight:800;margin-top:1px">✓</span>${line}</li>`).join('')}</ul>
      <a href="#buchen" onclick="setAirport('${card.code}')" style="display:block;text-align:center;margin-top:24px;background:#F39214;color:#fff;font-family:'Sora';font-weight:700;font-size:16px;padding:14px;border-radius:12px;box-shadow:0 8px 18px rgba(243,146,20,.28)">${T.bookCard}</a>
    </div>`).join('');

  $('steps').innerHTML=T.steps.map(step=>
    `<div style="background:#fff;border:1px solid #EAF0F8;border-radius:18px;padding:28px;text-align:center;box-shadow:0 6px 20px -12px rgba(16,40,82,.14)">
      <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1A6BE0,#1453B8);color:#fff;font-family:'Sora';font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto">${step.n}</div>
      <h3 style="font-family:'Sora';font-weight:700;font-size:19px;color:#0E2A52;margin-top:18px">${step.title}</h3>
      <p style="font-size:14.5px;color:#5E6B82;margin-top:8px">${step.text}</p></div>`).join('');

  $('features').innerHTML=T.features.map(f=>
    `<div style="display:flex;gap:15px;align-items:flex-start">
      <div style="flex-shrink:0;width:42px;height:42px;border-radius:12px;background:#fff;border:1px solid #DCE7F6;display:flex;align-items:center;justify-content:center;color:#1A6BE0;font-size:18px;font-weight:800;box-shadow:0 3px 10px rgba(16,40,82,.07)">${f.icon}</div>
      <div><h3 style="font-family:'Sora';font-weight:700;font-size:17px;color:#0E2A52">${f.t}</h3>
        <p style="font-size:14.5px;color:#46546E;margin-top:3px;max-width:440px">${f.d}</p></div></div>`).join('');

  $('reviews').innerHTML=T.reviews.map(r=>
    `<div style="background:#fff;border:1px solid #EAF0F8;border-radius:18px;padding:24px;box-shadow:0 8px 24px -14px rgba(16,40,82,.16)">
      <div style="color:#F39214;font-size:15px;letter-spacing:1px">★★★★★</div>
      <p style="font-size:15px;color:#2B3A55;margin-top:12px;line-height:1.6">${r.text}</p>
      <div style="display:flex;align-items:center;gap:11px;margin-top:18px;padding-top:16px;border-top:1px solid #EEF2F8">
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1A6BE0,#1453B8);color:#fff;font-family:'Sora';font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center">${r.initial}</div>
        <div><div style="font-weight:700;font-size:14px;color:#0E2A52">${r.name}</div><div style="font-size:12.5px;color:#8794A8">${r.meta}</div></div></div></div>`).join('');

  renderFaq();
}
function renderFaq(){
  const T=t();
  $('faqList').innerHTML=T.faqs.map((f,i)=>
    `<div style="background:#fff;border:1px solid #E7EDF6;border-radius:14px;overflow:hidden">
      <button onclick="toggleFaq(${i})" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 22px;background:none;border:none;cursor:pointer;text-align:left">
        <span style="font-family:'Sora';font-weight:700;font-size:16px;color:#0E2A52">${f.q}</span>
        <span style="flex-shrink:0;font-size:22px;color:#1A6BE0;font-weight:400;line-height:1">${openFaq===i?'−':'+'}</span></button>
      ${openFaq===i?`<p style="padding:0 22px 20px;font-size:15px;color:#46546E;line-height:1.6">${f.a}</p>`:''}
    </div>`).join('');
}

// ── Toggle-Styles aktualisieren ───────────────────────────────────────
function refreshToggles(){
  $('langDe').setAttribute('style',langStyle(lang==='de'));
  $('langEn').setAttribute('style',langStyle(lang==='en'));
  $('airVie').setAttribute('style',airStyle(airport==='VIE'));
  $('airBts').setAttribute('style',airStyle(airport==='BTS'));
  $('tripRound').setAttribute('style',segStyle(tripType==='round'));
  $('tripOneway').setAttribute('style',segStyle(tripType==='oneway'));
  $('tripReturn').setAttribute('style',segStyle(tripType==='return'));
  $('outboundBlock').classList.toggle('hidden',tripType==='return');
  $('returnBlock').classList.toggle('hidden',tripType==='oneway');
  $('personsVal').textContent=persons;
}

// ── Handler ───────────────────────────────────────────────────────────
function setLang(l){lang=l;applyText();renderLists();refreshToggles();updatePriceUI();}
function setAirport(a){airport=a;refreshToggles();fetchPrice();}
function setTrip(tt){tripType=tt;refreshToggles();computePrice();}
function changePersons(d){persons=Math.min(8,Math.max(1,persons+d));refreshToggles();}
function toggleFaq(i){openFaq=(openFaq===i?-1:i);renderFaq();}

// ── Preis live berechnen ──────────────────────────────────────────────
function onAddressInput(){
  clearTimeout(priceTimer);
  const a=$('address').value.trim();
  if(a.length<4){$('priceBox').classList.add('hidden');lastKm=null;return;}
  priceTimer=setTimeout(fetchPrice,800);
}
function fetchPrice(){
  const a=$('address').value.trim();
  if(a.length<4){$('priceBox').classList.add('hidden');return;}
  $('priceBox').classList.remove('hidden');
  $('priceSpin').classList.remove('hidden');
  $('priceVal').textContent='';
  $('priceKm').textContent='';
  const url=APPS_SCRIPT_URL+'?action=price&airport='+airport+'&adresse='+encodeURIComponent(a);
  fetch(url).then(r=>r.json()).then(d=>{
    $('priceSpin').classList.add('hidden');
    if(d.status==='ok'){
      lastKm=d.km; lastRate=d.preisProKm;
      computePrice();
    }else{
      lastKm=null;
      $('priceVal').textContent='—';
      $('priceKm').textContent=(lang==='de'?'Adresse nicht gefunden':'Address not found');
    }
  }).catch(()=>{
    $('priceSpin').classList.add('hidden');
    lastKm=null;
    $('priceVal').textContent='—';
    $('priceKm').textContent=(lang==='de'?'Preis folgt nach Bestätigung':'Price follows after confirmation');
  });
}
function currentPrice(){
  if(lastKm==null||lastRate==null) return null;
  let base=lastKm*lastRate;
  if(tripType==='round') base=base*2*0.8;   // Hin & Retour: 20% Rabatt
  return Math.round(base);
}
function computePrice(){updatePriceUI();}
function updatePriceUI(){
  const p=currentPrice();
  if(p==null){
    if(lastKm==null) return;
  }else{
    $('priceVal').textContent=p+' €';
    const tripTxt=tripType==='round'?t().tripRound:tripType==='oneway'?t().tripOneway:t().tripReturn;
    $('priceKm').textContent='ca. '+lastKm+' km · '+tripTxt;
  }
  $('priceBox').querySelector('.lbl').textContent=t().priceLabel;
}

// ── Buchung absenden ──────────────────────────────────────────────────
function submitBooking(e){
  e.preventDefault();
  const f=e.target.elements;
  const g=(n)=>f[n]&&f[n].value?f[n].value:'';
  const btn=$('submitBtn');
  btn.disabled=true; btn.style.opacity='.7';
  btn.textContent=(lang==='de'?'Wird gesendet…':'Sending…');

  const airportName=airport==='VIE'?'Flughafen Wien (VIE)':'Flughafen Bratislava (BTS)';
  const tripTxt=tripType==='round'?t().tripRound:tripType==='oneway'?t().tripOneway:t().tripReturn;
  const von=(tripType!=='return')?(g('outDate')+' '+g('outTime')).trim():'';
  const bis=(tripType!=='oneway')?(g('retDate')+' '+g('retTime')).trim():'';
  const preis=currentPrice();

  const params=new URLSearchParams({
    action:'book',
    name:g('name'), tel:g('phone'), email:g('email'),
    adresse:g('address'),
    direction:airport+' · '+tripTxt,
    von:von, bis:bis,
    personen:String(persons),
    km:lastKm!=null?String(lastKm):'',
    preis:preis!=null?String(preis):''
  });

  fetch(APPS_SCRIPT_URL+'?'+params.toString())
    .then(r=>r.json()).catch(()=>({status:'ok'}))
    .then(()=>showConfirmation(g, airportName, tripTxt, von, bis, preis))
    .finally(()=>{btn.disabled=false;btn.style.opacity='1';btn.textContent=t().submit;});
  return false;
}
function showConfirmation(g, airportName, tripTxt, von, bis, preis){
  const T=t();
  const rows=[];
  rows.push([T.lblAirport, airportName]);
  rows.push([T.lblTrip, tripTxt]);
  rows.push([T.lblAddress, g('address')||'—']);
  if(tripType!=='return') rows.push([T.lblOutbound, von||'—']);
  if(tripType!=='oneway') rows.push([T.lblReturn, bis||'—']);
  rows.push([T.lblPersons, String(persons)]);
  if(preis!=null) rows.push([T.priceLabel, preis+' €']);
  rows.push([T.lblName, g('name')||'—']);
  rows.push([T.lblPhone, g('phone')||'—']);
  rows.push([T.lblEmail, g('email')||'—']);
  $('summaryRows').innerHTML=rows.map(r=>
    `<div style="display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-bottom:1px solid #EDF1F8;font-size:14px">
      <span style="color:#6B7892">${r[0]}</span><span style="color:#0E2A52;font-weight:600;text-align:right">${r[1]}</span></div>`).join('');
  $('bookForm').classList.add('hidden');
  $('confBox').classList.remove('hidden');
  $('confBox').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetForm(){
  $('bookForm').reset();
  lastKm=null;lastRate=null;
  $('priceBox').classList.add('hidden');
  $('confBox').classList.add('hidden');
  $('bookForm').classList.remove('hidden');
  persons=2;tripType='round';airport='VIE';
  refreshToggles();
}

// ── Init ──────────────────────────────────────────────────────────────
applyText();renderLists();refreshToggles();
</script>
